# KNN on Fisher Iris: 5-fold CV, k=3, euclidean, forward, t=0.95, n=1000
train = "../../machine learning datasets/default/fisher_iris.csv"
n = 10000
m = 5
classifier = "knn"

[testing.cv]
folds = 5

[parameters]
k = 3

distance = "euclidean"

[goal]
t = 0.95

[direction.forward]

[sampling.stratified]

seed = 42
output_dir = "results"
