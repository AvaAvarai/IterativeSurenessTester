# BAP config: MNIST train/test, k-NN k=3, correlation (1 - Pearson), m=100, n=1000
# Use: python bap.py -c examples/configs/config_mnist.toml
# Or:  julia julia/bap.jl -c examples/configs/config_mnist.toml

train = "../../machine learning datasets/default/mnist_train.csv"
test = "../../machine learning datasets/default/mnist_test.csv"
classifier = "knn"
distance = "correlation"
n = 1000
m = 100
splits = 1
seed = 42
output_dir = "results"

[testing.fixed]

[goal]
t = 0.95

[parameters]
k = 3

[direction.forward]

[sampling.stratified]
