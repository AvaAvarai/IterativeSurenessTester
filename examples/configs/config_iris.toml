# Sample BAP config: single CSV with train/test split (e.g. Fisher Iris)
# Use: python3.11 bap.py -c examples/configs/config_iris.toml
# Or:  julia julia/bap.jl -c examples/configs/config_iris.toml

train = "../../machine learning datasets/default/fisher_iris.csv"

[testing.split]
split = [0.8, 0.2]

[goal]
t = 0.95

classifier = "dt"

[parameters]
# k = 3  # for KNN only

distance = "euclidean"

[direction.forward]
# Use direction.backward for subtractive (start full, remove cases)

splits = 1
n = 10
m = 5

[sampling.stratified]
# Use sampling.random for random sampling

seed = 42
output_dir = "results"
